# https://render.com/docs/blueprint-spec
# Push this to GitHub, then on Render: New → Blueprint → select repo → done.

databases:
  - name: poetry-db
    plan: free
    databaseName: poetry_bot
    user: poetry
    postgresSql:
      version: "16"

services:
  - type: web
    name: poetry-backend
    plan: free
    rootDir: backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: poetry-db
          property: connectionString
        # NOTE: Render gives postgresql://, we need postgresql+asyncpg://
        # This is handled via the RENDER_DATABASE_URL trick below
      - key: PORT
        value: "8000"
      - key: GOOGLE_API_KEY
        sync: false
      - key: YANDEX_SEARCH_API_KEY
        sync: false
      - key: YANDEX_FOLDER_ID
        sync: false
    healthCheckPath: /health

  - type: worker
    name: poetry-bot
    plan: free
    rootDir: bot
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BACKEND_URL
        fromService:
          name: poetry-backend
          type: web
          property: hostport
