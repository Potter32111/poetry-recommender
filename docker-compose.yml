services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: poetry_bot
      POSTGRES_USER: poetry
      POSTGRES_PASSWORD: ${DB_PASSWORD:-poetry_secret_123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poetry -d poetry_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://poetry:${DB_PASSWORD:-poetry_secret_123}@db:5432/poetry_bot
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

  bot:
    build: ./bot
    depends_on:
      - backend
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_URL: http://backend:8000
    restart: unless-stopped

volumes:
  pgdata:
  hf_cache:
