services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: poetry_bot
      POSTGRES_USER: poetry
      POSTGRES_PASSWORD: ${DB_PASSWORD:-poetry_secret_123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poetry -d poetry_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    network_mode: "host"
    environment:
      DATABASE_URL: postgresql+asyncpg://poetry:${DB_PASSWORD:-poetry_secret_123}@localhost:5432/poetry_bot
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      YANDEX_SEARCH_API_KEY: ${YANDEX_SEARCH_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      HF_ENDPOINT: https://hf-mirror.com
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

  bot:
    build: ./bot
    depends_on:
      - backend
    network_mode: "host"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_URL: http://localhost:8000
    volumes:
      - ./bot:/app
    restart: unless-stopped

volumes:
  pgdata:
  hf_cache:
